document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

h;\n  }\n  .mono { font-family: 'Geist Mono', ui-monospace, 'SF Mono', monospace; }\n\n  /* layout */\n  .page { max-width: 1080px; margin: 0 auto; padding: 0 48px; }\n  @media (max-width: 720px) { .page { padding: 0 24px; } }\n\n  /* nav */\n  nav.top {\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 28px 0; border-bottom: 1px solid var(--line-soft);\n    font-family: 'Geist Mono', monospace; font-size: 12px;\n    color: var(--fg-mute); letter-spacing: 0.02em;\n  }\n  nav.top .brand { color: var(--fg); display: flex; align-items: center; gap: 10px; }\n  nav.top .dot {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: var(--accent);\n    box-shadow: 0 0 0 4px oklch(0.82 0.14 148 / 0.12);\n  }\n  nav.top a { color: var(--fg-mute); text-decoration: none; margin-left: 24px; transition: color .15s; }\n  nav.top a:hover { color: var(--fg); }\n\n  /* section frame */\n  section { padding: 96px 0; border-bottom: 1px solid var(--line-soft); }\n  section:last-of-type { border-bottom: none; }\n  .label {\n    font-family: 'Geist Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--fg-dim);\n    margin-bottom: 24px;\n    display: flex; align-items: center; gap: 12px;\n  }\n  .label::before {\n    content: ''; width: 24px; height: 1px; background: var(--line);\n  }\n\n  /* hero */\n  .hero { padding: 96px 0 128px; border-bottom: 1px solid var(--line-soft); }\n  .hero .hero-label { margin-bottom: 40px; }\n  .hero .src-link {\n    color: var(--fg); text-decoration: none;\n    border-bottom: 1px solid var(--line);\n    padding-bottom: 1px; transition: color .15s, border-color .15s;\n  }\n  .hero .src-link:hover { color: var(--accent); border-color: var(--accent); }\n  .hero .src-link span { color: var(--fg-dim); margin-left: 2px; }\n\n  /* hero video */\n  .hero-video { margin: 0 0 48px; }\n  .hero-video .video-frame {\n    position: relative;\n    width: 100%;\n    aspect-ratio: 16 / 9;\n    background: oklch(0.13 0.005 80);\n    border: 1px solid var(--line-soft);\n    border-radius: 4px;\n    overflow: hidden;\n  }\n  .hero-video iframe {\n    position: absolute; inset: 0;\n    width: 100%; height: 100%;\n    border: 0; display: block;\n  }\n  .hero-video figcaption {\n    margin-top: 12px;\n    font-family: 'Geist Mono', monospace;\n    font-size: 11px;\n    color: var(--fg-dim);\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n  }\n  h1 {\n    font-size: clamp(36px, 5.2vw, 64px);\n    line-height: 1.08;\n    letter-spacing: -0.03em;\n    font-weight: 500;\n    margin: 0 0 32px;\n    max-width: 22ch;\n    text-wrap: balance;\n  }\n  h1 em { font-style: normal; color: var(--fg-dim); font-weight: 400; }\n  .hero p.lede {\n    font-size: 19px;\n    line-height: 1.5;\n    color: var(--fg-mute);\n    max-width: 60ch;\n    margin: 0 0 48px;\n    text-wrap: pretty;\n  }\n  .hero .stats {\n    display: grid;\n    grid-template-columns: repeat(3, minmax(0, 1fr));\n    gap: 0;\n    border-top: 1px solid var(--line-soft);\n    padding-top: 28px;\n    max-width: 640px;\n  }\n  .hero .stats > div { padding-right: 24px; }\n  .hero .stats .k { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }\n  .hero .stats .v { font-size: 17px; color: var(--fg); }\n\n  /* generic content */\n  h2 {\n    font-size: clamp(28px, 3.4vw, 40px);\n    line-height: 1.1;\n    letter-spacing: -0.025em;\n    font-weight: 500;\n    margin: 0 0 24px;\n    max-width: 22ch;\n    text-wrap: balance;\n  }\n  h2 em { font-style: normal; color: var(--fg-dim); font-weight: 400; }\n  p { color: var(--fg-mute); max-width: 64ch; margin: 0 0 16px; text-wrap: pretty; }\n  p.body { font-size: 17px; line-height: 1.6; }\n  strong { color: var(--fg); font-weight: 500; }\n\n  /* problem */\n  .problem-grid { display: grid; grid-template-columns: 1.05fr 1fr; gap: 56px; align-items: start; }\n  @media (max-width: 720px) { .problem-grid { grid-template-columns: 1fr; gap: 24px; } }\n  .problem-grid h2 { margin: 0; max-width: 14ch; }\n  .problem-body p:last-child { margin-bottom: 0; }\n  .aside {\n    font-style: normal;\n    color: var(--fg);\n    border-bottom: 1px dashed var(--line);\n    padding-bottom: 1px;\n  }\n\n  /* modules list */\n  .modules {\n    margin-top: 32px;\n    border-top: 1px solid var(--line-soft);\n  }\n  .module {\n    display: grid;\n    grid-template-columns: 240px 1fr;\n    gap: 56px;\n    padding: 32px 0;\n    border-bottom: 1px solid var(--line-soft);\n    align-items: start;\n  }\n  @media (max-width: 720px) {\n    .module { grid-template-columns: 1fr; gap: 12px; padding: 24px 0; }\n  }\n  .module-head { display: flex; flex-direction: column; gap: 6px; }\n  .module .pages {\n    list-style: none; margin: 12px 0 0; padding: 0;\n    display: flex; flex-direction: column; gap: 4px;\n    font-family: 'Geist Mono', monospace; font-size: 12px;\n    color: var(--fg-mute); letter-spacing: 0.01em;\n  }\n  .module .pages li {\n    position: relative; padding-left: 14px;\n  }\n  .module .pages li::before {\n    content: ''; position: absolute;\n    left: 0; top: 0.65em;\n    width: 6px; height: 1px;\n    background: var(--line);\n  }\n  .module .num {\n    font-family: 'Geist Mono', monospace; font-size: 12px;\n    color: var(--fg-dim); letter-spacing: 0.08em;\n  }\n  .module h3 {\n    margin: 0; font-size: 20px; font-weight: 500;\n    letter-spacing: -0.015em; color: var(--fg);\n  }\n  .module p {\n    margin: 0; font-size: 15.5px; line-height: 1.6;\n    color: var(--fg-mute); max-width: 62ch;\n  }\n\n  /* screenshots grid */\n  .screens-grid {\n    margin-top: 56px;\n    display: grid;\n    grid-template-columns: repeat(2, 1fr);\n    gap: 32px 24px;\n  }\n  @media (max-width: 720px) {\n    .screens-grid { grid-template-columns: 1fr; gap: 28px; }\n  }\n  .screen { margin: 0; }\n  .screen-frame {\n    position: relative;\n    background: oklch(0.13 0.005 80);\n    border: 1px solid var(--line-soft);\n    border-radius: 4px;\n    overflow: hidden;\n    padding: 8px;\n    transition: border-color .15s;\n  }\n  .screen-frame:hover { border-color: var(--line); }\n  .screen-frame img {\n    display: block;\n    width: 100%;\n    height: auto;\n    border-radius: 2px;\n  }\n  .screen figcaption {\n    margin-top: 12px;\n    font-family: 'Geist Mono', monospace;\n    font-size: 11px;\n    color: var(--fg-dim);\n    letter-spacing: 0.04em;\n    line-height: 1.5;\n  }\n  .postmortem {\n    margin-top: 40px;\n    padding: 28px 32px 28px 32px;\n    border-left: 2px solid var(--accent-dim);\n    background: oklch(0.18 0.005 80 / 0.5);\n    border-radius: 0 4px 4px 0;\n  }\n  @media (max-width: 720px) { .postmortem { padding: 22px 22px 22px 22px; } }\n  .postmortem .pm-label {\n    font-family: 'Geist Mono', monospace; font-size: 11px;\n    color: var(--accent); letter-spacing: 0.12em;\n    text-transform: uppercase; margin-bottom: 14px;\n  }\n  .postmortem p {\n    margin: 0 0 14px; color: var(--fg);\n    font-size: 15.5px; line-height: 1.6; max-width: 62ch;\n  }\n  .postmortem .pm-kicker {\n    color: var(--fg-mute); font-style: italic;\n    border-top: 1px solid var(--line-soft);\n    padding-top: 14px; margin-bottom: 0;\n    font-size: 14.5px;\n  }\n\n  /* stack / build */\n  .stack {\n    display: grid;\n    grid-template-columns: 200px 1fr;\n    gap: 12px 48px;\n    margin-top: 32px;\n    border-top: 1px solid var(--line-soft);\n    padding-top: 20px;\n  }\n  @media (max-width: 720px) { .stack { grid-template-columns: 1fr; gap: 4px 0; } }\n  .stack .row { display: contents; }\n  .stack dt {\n    font-family: 'Geist Mono', monospace; font-size: 12px;\n    color: var(--fg-dim); letter-spacing: 0.04em;\n    padding: 14px 0 14px;\n    border-bottom: 1px solid var(--line-soft);\n  }\n  .stack dd {\n    margin: 0; padding: 14px 0;\n    color: var(--fg); font-size: 15px;\n    border-bottom: 1px solid var(--line-soft);\n  }\n  @media (max-width: 720px) {\n    .stack dt { border-bottom: none; padding: 14px 0 2px; }\n    .stack dd { padding: 0 0 14px; }\n  }\n\n  /* result */\n  .result-meta {\n    font-size: 11px; color: var(--fg-dim);\n    letter-spacing: 0.12em; text-transform: uppercase;\n    margin-bottom: 14px;\n  }\n  .result {\n    display: grid; grid-template-columns: 0.9fr 1.1fr;\n    gap: 56px; align-items: start;\n    padding: 24px 0 8px;\n  }\n  @media (max-width: 720px) { .result { grid-template-columns: 1fr; gap: 24px; } }\n  .result-stat { padding-top: 4px; }\n  .result .big {\n    font-family: 'Geist', sans-serif;\n    font-size: clamp(96px, 14vw, 168px);\n    line-height: 0.88;\n    letter-spacing: -0.06em;\n    font-weight: 500;\n    color: var(--fg);\n    display: flex; align-items: baseline; gap: 0;\n  }\n  .result .big .unit {\n    font-size: 0.65em; color: var(--accent);\n    letter-spacing: -0.04em; font-weight: 400;\n    margin-left: 2px;\n  }\n  .result .caption {\n    font-family: 'Geist Mono', monospace; font-size: 12px;\n    color: var(--fg-dim);\n    letter-spacing: 0.04em; margin-top: 20px;\n    line-height: 1.6;\n    max-width: 28ch;\n  }\n  .result-body p { margin: 0; }\n\n  /* knock-on list */\n  .knockon {\n    margin-top: 56px;\n    border-top: 1px solid var(--line-soft);\n    padding-top: 28px;\n  }\n  .knockon-label {\n    font-size: 11px; color: var(--fg-dim);\n    letter-spacing: 0.12em; text-transform: uppercase;\n    margin-bottom: 18px;\n  }\n  .knockon ul {\n    list-style: none; margin: 0 0 24px; padding: 0;\n    display: grid; gap: 0;\n  }\n  .knockon li {\n    display: grid;\n    grid-template-columns: 200px 1fr;\n    gap: 32px;\n    padding: 12px 0;\n    border-bottom: 1px solid var(--line-soft);\n    font-size: 15px; line-height: 1.5;\n  }\n  @media (max-width: 720px) {\n    .knockon li { grid-template-columns: 1fr; gap: 4px; }\n  }\n  .knockon li:last-child { border-bottom: none; }\n  .knockon li .k {\n    font-family: 'Geist Mono', monospace; font-size: 12px;\n    color: var(--fg); letter-spacing: 0.02em;\n  }\n  .knockon li .v { color: var(--fg-mute); }\n  .knockon li .arrow {\n    font-family: 'Geist Mono', monospace;\n    color: var(--accent); padding: 0 4px;\n  }\n  .knockon-kicker {\n    color: var(--fg-mute); font-style: italic;\n    font-size: 14.5px; line-height: 1.55;\n    margin: 0; max-width: 64ch;\n  }\n\n  /* roadmap */\n  .roadmap { margin-top: 16px; }\n  .road-row {\n    display: grid;\n    grid-template-columns: 60px 1fr 120px;\n    gap: 32px; align-items: start;\n    padding: 28px 0;\n    border-bottom: 1px solid var(--line-soft);\n  }\n  .road-row:first-child { border-top: 1px solid var(--line-soft); }\n  @media (max-width: 720px) {\n    .road-row { grid-template-columns: 1fr; gap: 8px; padding: 22px 0; }\n  }\n  .road-row .when {\n    font-family: 'Geist Mono', monospace; font-size: 12px;\n    color: var(--fg-dim); letter-spacing: 0.04em;\n    padding-top: 2px;\n  }\n  .road-row .what { color: var(--fg); font-size: 17px; font-weight: 500; letter-spacing: -0.01em; margin-bottom: 6px; }\n  .road-row .desc { color: var(--fg-mute); font-size: 15px; line-height: 1.55; max-width: 64ch; }\n  .road-row .status {\n    font-family: 'Geist Mono', monospace; font-size: 11px;\n    padding: 4px 10px; border-radius: 4px;\n    letter-spacing: 0.06em; text-transform: uppercase;\n    border: 1px solid var(--line);\n    color: var(--fg-mute);\n    white-space: nowrap;\n    justify-self: end;\n    align-self: start;\n  }\n  .road-row .status.now {\n    color: var(--warn); border-color: oklch(0.5 0.1 70);\n    background: oklch(0.5 0.1 70 / 0.08);\n  }\n  @media (max-width: 720px) {\n    .road-row .status { justify-self: start; }\n  }\n\n  /* closing */\n  .closing {\n    padding: 96px 0 96px;\n    border-bottom: none;\n  }\n  .closing .closing-body {\n    font-size: 17px;\n    line-height: 1.65;\n    color: var(--fg-mute);\n    max-width: 64ch;\n    margin: 0 0 56px;\n    text-wrap: pretty;\n  }\n  .closing .closing-body strong { color: var(--fg); font-weight: 500; }\n  .closing-statement {\n    font-size: clamp(28px, 4vw, 44px);\n    line-height: 1.15;\n    letter-spacing: -0.025em;\n    font-weight: 500;\n    color: var(--fg);\n    max-width: 24ch;\n    margin: 0 0 64px;\n    text-wrap: balance;\n  }\n  .closing-statement em {\n    font-style: normal; color: var(--fg-dim); font-weight: 400;\n  }\n  .signoff {\n    display: flex; flex-direction: column; align-items: flex-start; gap: 8px;\n    margin-top: 0;\n    padding-top: 28px;\n    border-top: 1px solid var(--line-soft);\n    font-family: 'Geist Mono', monospace; font-size: 14px;\n    color: var(--fg-dim);\n  }\n  .signoff a {\n    color: var(--fg); text-decoration: none;\n    border-bottom: 1px solid var(--line);\n    padding-bottom: 2px;\n    transition: border-color .15s, color .15s;\n  }\n  .signoff a.secondary { color: var(--fg-mute); font-size: 13px; }\n  .signoff a:hover { border-color: var(--accent); color: var(--accent); }\n\n  /* footer */\n  footer {\n    padding: 24px 0 36px;\n    border-top: 1px solid var(--line-soft);\n    font-family: 'Geist Mono', monospace; font-size: 11px;\n    color: var(--fg-dim);\n    display: flex; justify-content: space-between;\n    letter-spacing: 0.04em;\n  }\n\n  /* placeholder treatment */\n  .ph { color: var(--fg-dim); font-style: normal; }\n  .ph::before { content: '['; opacity: 0.6; }\n  .ph::after  { content: ']'; opacity: 0.6; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<div class=\"page\">\n\n  <nav class=\"top\">\n    <div class=\"brand\"><span class=\"dot\"><\u002Fspan>VCP / Trading System<\u002Fdiv>\n    <div>\n      <a href=\"#problem\">Problem<\u002Fa>\n      <a href=\"#modules\">System<\u002Fa>\n      <a href=\"#build\">Build<\u002Fa>\n      <a href=\"#roadmap\">Roadmap<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- HERO -->\n  <section class=\"hero\" data-screen-label=\"01 Hero\">\n    <div class=\"label hero-label\">01 / Why this exists<\u002Fdiv>\n    <h1><em>Most tools tell you what to trade.<\u002Fem><br>I built one that tells me when, why, and whether I'm ready.<\u002Fh1>\n    <p class=\"lede\">\n      The VCP Trading System is a full-stack stock screening and trade management application — built from scratch — that identifies institutional-quality momentum setups from the S&amp;P 500, scores them against a rigorous <strong>100-point model<\u002Fstrong>, and walks me through every decision from initial signal to final exit.\n    <\u002Fp>\n\n    <figure class=\"hero-video\">\n      <div class=\"video-frame\">\n        <iframe src=\"https://www.youtube.com/embed/W3l699zaYuw\" title=\"VCP Trading System — full walkthrough\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen=\"\"><\u002Fiframe>\n      <\u002Fdiv>\n      <figcaption>Full walkthrough · 60 sec<\u002Ffigcaption>\n    <\u002Ffigure>\n\n    <div class=\"stats\">\n      <div>\n        <div class=\"k\">Built<\u002Fdiv>\n        <div class=\"v\">Mar&nbsp;–&nbsp;May 2026<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"k\">Stack<\u002Fdiv>\n        <div class=\"v\">Python · Streamlit · SQLite<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"k\">Source<\u002Fdiv>\n        <div class=\"v\">~8,700 lines · Python<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROBLEM -->\n  <section id=\"problem\" data-screen-label=\"02 Problem\">\n    <div class=\"label\">02 / The problem<\u002Fdiv>\n    <div class=\"problem-grid\">\n      <h2>Weekly screening across 500 stocks. <em>Three tools. Hours of work. No audit trail.<\u002Fem><\u002Fh2>\n      <div class=\"problem-body\">\n        <p class=\"body\">\n          I was screening stocks manually — a combination of TradingView watch lists, spreadsheets tracking position sizing, and a notes app for pre-trade reasoning. Each tool did one thing adequately and none of them talked to each other.\n        <\u002Fp>\n        <p class=\"body\">\n          The real problem was <strong>decision lag<\u002Fstrong>: by the time I'd pulled price data, checked my sizing rules, reviewed the chart, and written down my reasoning, 20 minutes had passed and the moment had either passed or I'd talked myself into a worse trade. The process was leaky enough that I couldn't tell whether a bad outcome came from a bad setup or a bad decision.\n        <\u002Fp>\n        <p class=\"body\">\n          The specific moment that tipped me was realising I had no reliable way to answer <em class=\"aside\">\"what made this trade worth taking?\"<\u002Fem> after the fact. The data was scattered across three tools and my own memory. I needed one system that captured the full chain — from signal to sizing to outcome — in a form I could actually learn from.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHAT IT DOES — 5 MODULES -->\n  <section id=\"modules\" data-screen-label=\"03 Modules\">\n    <div class=\"label\">03 / What it does<\u002Fdiv>\n    <h2>Nine pages. Five modules. <em>One feedback loop.<\u002Fem><\u002Fh2>\n\n    <div class=\"modules\">\n\n      <div class=\"module\">\n        <div class=\"module-head\">\n          <div class=\"num\">01<\u002Fdiv>\n          <h3>Signal generation<\u002Fh3>\n          <ul class=\"pages\">\n            <li>Screener<\u002Fli>\n            <li>VCP Candidates<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <p>Runs every S&amp;P 500 stock through <strong>ten structural hard filters<\u002Fstrong>, then scores each survivor on a 100-point model across five components: pattern tightness, volume behaviour, contraction count, trend quality, and relative strength ranking within the universe. What comes out is a ranked shortlist of setups worth looking at — not a raw list of 500 stocks to sort through manually.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"module\">\n        <div class=\"module-head\">\n          <div class=\"num\">02<\u002Fdiv>\n          <h3>Setup review<\u002Fh3>\n          <ul class=\"pages\">\n            <li>Candidate Review<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <p>An interactive chart per candidate with price history, moving averages, and entry and stop levels plotted directly. <strong>The place where a score becomes a judgment call.<\u002Fstrong> Sector trend is overlaid so context is visible without switching screens.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"module\">\n        <div class=\"module-head\">\n          <div class=\"num\">03<\u002Fdiv>\n          <h3>Watchlist &amp; simulation<\u002Fh3>\n          <ul class=\"pages\">\n            <li>Watchlist Monitor<\u002Fli>\n            <li>Paper Trades<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <p>Shortlisted stocks tracked in real time: proximity to entry, volume dry-up, pattern health. Paper Trades logs hypothetical entries against real price data to <strong>test conviction before committing capital<\u002Fstrong>, with outcomes tracked separately from live positions.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"module\">\n        <div class=\"module-head\">\n          <div class=\"num\">04<\u002Fdiv>\n          <h3>Pre-trade discipline<\u002Fh3>\n          <ul class=\"pages\">\n            <li>Pre-Trade Checklist<\u002Fli>\n            <li>Not Suitable<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <p>Before any live position opens, the system calculates risk-reward, position size, and price targets automatically. The checklist enforces a defined standard before I act. Rejected setups go to a separate log with reasons attached — so <em class=\"aside\">the decision is recorded, not just discarded.<\u002Fem><\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"module\">\n        <div class=\"module-head\">\n          <div class=\"num\">05<\u002Fdiv>\n          <h3>Trade management &amp; review<\u002Fh3>\n          <ul class=\"pages\">\n            <li>Open Positions<\u002Fli>\n            <li>Trade Log<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <p>Live P&amp;L, an alert engine, and lot-level exit tracking per position. Market conditions and emotional state are captured at entry — because I want to know eventually whether my worst trades correlate with specific conditions or decision-making states. Closed trades feed a performance analytics layer: <strong>win rate, average risk multiple, and outcomes broken down by market regime<\u002Fstrong>.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div class=\"screens-grid\">\n      <figure class=\"screen\">\n        <div class=\"screen-frame\">\n          <img src=\"50f209e3-af68-41a5-98f0-5cbd5d761baf\" alt=\"Screener page — 502 stocks filtered to ranked candidates\" loading=\"lazy\">\n        <\u002Fdiv>\n        <figcaption>Screener — 502 stocks filtered to ranked candidates<\u002Ffigcaption>\n      <\u002Ffigure>\n      <figure class=\"screen\">\n        <div class=\"screen-frame\">\n          <img src=\"776bf326-ee25-4867-815a-0c3b8c1743ce\" alt=\"VCP Candidates page — ranked shortlist with trade readiness flags\" loading=\"lazy\">\n        <\u002Fdiv>\n        <figcaption>VCP Candidates — ranked shortlist with trade readiness<\u002Ffigcaption>\n      <\u002Ffigure>\n      <figure class=\"screen\">\n        <div class=\"screen-frame\">\n          <img src=\"e91fcf96-3b10-4ad8-b05e-c19aec232757\" alt=\"Pre-Trade Checklist page — auto-calculated position sizing and exit plan\" loading=\"lazy\">\n        <\u002Fdiv>\n        <figcaption>Pre-Trade Checklist — auto-calculated position sizing and exit plan<\u002Ffigcaption>\n      <\u002Ffigure>\n      <figure class=\"screen\">\n        <div class=\"screen-frame\">\n          <img src=\"fc27da40-31dd-4726-8e65-5c3de24716da\" alt=\"Trade Log page — closed trades with R-multiple and mindset tracking\" loading=\"lazy\">\n        <\u002Fdiv>\n        <figcaption>Trade Log — closed trades with R-multiple and mindset tracking<\u002Ffigcaption>\n      <\u002Ffigure>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section id=\"build\" data-screen-label=\"04 Build\">\n    <div class=\"label\">04 / How I built it<\u002Fdiv>\n    <h2>Built to be <em>used, not demonstrated.<\u002Fem><\u002Fh2>\n\n    <dl class=\"stack\">\n      <div class=\"row\"><dt>Language<\u002Fdt><dd>Python 3.12<\u002Fdd><\u002Fdiv>\n      <div class=\"row\"><dt>Interface<\u002Fdt><dd>Streamlit<\u002Fdd><\u002Fdiv>\n      <div class=\"row\"><dt>Persistence<\u002Fdt><dd>SQLite<\u002Fdd><\u002Fdiv>\n      <div class=\"row\"><dt>Data<\u002Fdt><dd>yfinance + financial data API · market &amp; fundamentals<\u002Fdd><\u002Fdiv>\n      <div class=\"row\"><dt>Source<\u002Fdt><dd>Single file · ~8,700 lines · version-controlled on GitHub throughout<\u002Fdd><\u002Fdiv>\n      <div class=\"row\"><dt>Tooling<\u002Fdt><dd>Claude Code (primary) + Cursor (alongside)<\u002Fdd><\u002Fdiv>\n    <\u002Fdl>\n\n    <p class=\"body\" style=\"margin-top: 32px;\">\n      Everything lives in a single ~8,700-line file — <strong>a deliberate choice for a solo build where simplicity outweighs modularity.<\u002Fstrong> I used Claude Code as the primary development environment and Cursor as an AI-assisted IDE alongside it — not to generate code I didn't understand, but to compress the feedback loop between <em class=\"aside\">\"I want this to behave differently\"<\u002Fem> and <em class=\"aside\">\"it does.\"<\u002Fem> I'd write the logic and spec the behaviour; the tools helped me implement and debug faster than I could alone. The architecture, the decisions, and the mistakes are all mine.\n    <\u002Fp>\n\n    <p class=\"body\">\n      The iteration loop was roughly weekly: run the screener, review candidates against real charts, find where the model disagreed with reality, trace the cause, and adjust. Most calibration work happened through a standalone diagnostic script that let me test individual tickers against the detection logic in isolation — which kept the main app stable while I was experimenting.\n    <\u002Fp>\n\n    <div class=\"postmortem\">\n      <div class=\"pm-label\">The hardest thing to figure out<\u002Fdiv>\n      <p>\n        The screener was surfacing setups with technically valid stop levels that were <strong>economically useless<\u002Fstrong> — the model was locking onto old tight bases from lower price levels, weeks or months after a large rally had made them irrelevant. Diagnosing it required building a 12-case backtest harness and tracing exactly which calculation was anchoring to the wrong reference point. The fix was architectural: changing how the pivot detector identifies swing points.\n      <\u002Fp>\n      <p class=\"pm-kicker\">\n        It's the kind of issue that's invisible until you've tested it against real data across enough different scenarios.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- KEY RESULT -->\n  <section data-screen-label=\"05 Result\">\n    <div class=\"label\">05 / One concrete result<\u002Fdiv>\n    <div class=\"result-meta mono\">Calibration finding · April 2026<\u002Fdiv>\n    <h2>The breakout filter was the primary bottleneck <em>— and the data made it obvious.<\u002Fem><\u002Fh2>\n\n    <div class=\"result\">\n      <div class=\"result-stat\">\n        <div class=\"big\">\n          <span>3<\u002Fspan><span class=\"unit\">×<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"caption\">Candidate yield<br>from a single threshold change — no quality loss<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"result-body\">\n        <p class=\"body\">\n          The screener was returning almost no candidates in early runs. Systematic <strong>one-change-at-a-time<\u002Fstrong> testing made the cause clear: a single threshold was eliminating the majority of viable setups before they ever reached scoring. Changing it to 10% tripled candidate yield without degrading setup quality.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"knockon\">\n      <div class=\"knockon-label mono\">That finding led to a broader recalibration pass<\u002Fdiv>\n      <ul>\n        <li><span class=\"k\">RS percentile gate<\u002Fspan><span class=\"v\">binary SPY comparison <span class=\"arrow\">→<\u002Fspan> universe-ranked composite<\u002Fspan><\u002Fli>\n        <li><span class=\"k\">Scoring weights<\u002Fspan><span class=\"v\">redistributed across five components<\u002Fspan><\u002Fli>\n        <li><span class=\"k\">Hard filters<\u002Fspan><span class=\"v\">three additional gates added<\u002Fspan><\u002Fli>\n      <\u002Ful>\n      <p class=\"knockon-kicker\">None of that would have been diagnosable without the diagnostic tooling or the structured screener run history.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ROADMAP -->\n  <section id=\"roadmap\" data-screen-label=\"06 Roadmap\">\n    <div class=\"label\">06 / What's next<\u002Fdiv>\n    <h2>Sequenced, <em>not scheduled.<\u002Fem><\u002Fh2>\n\n    <div class=\"roadmap\">\n      <div class=\"road-row\">\n        <div class=\"when\">01<\u002Fdiv>\n        <div class=\"road-main\">\n          <div class=\"what\">Live calibration period<\u002Fdiv>\n          <div class=\"desc\">Running the screener consistently for 4–6 weeks, logging all candidates and outcomes, and building enough real data to make confident structural changes rather than speculative ones.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"status now\">Now<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"road-row\">\n        <div class=\"when\">02<\u002Fdiv>\n        <div class=\"road-main\">\n          <div class=\"what\">Zigzag pivot detector<\u002Fdiv>\n          <div class=\"desc\">Replacing the fixed rolling-window pivot detection with a percentage-based swing detector — the highest-leverage architectural improvement identified, deferred until live data confirms it's the right priority.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"status\">Next<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"road-row\">\n        <div class=\"when\">03<\u002Fdiv>\n        <div class=\"road-main\">\n          <div class=\"what\">Fundamentals scoring layer<\u002Fdiv>\n          <div class=\"desc\">Wiring in the FMP API for earnings growth, revenue growth, and return on equity — currently scaffolded in the scoring model but not yet live in screener runs due to data source limitations.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"status\">Scaffolded<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"road-row\">\n        <div class=\"when\">04<\u002Fdiv>\n        <div class=\"road-main\">\n          <div class=\"what\">Order preparation module<\u002Fdiv>\n          <div class=\"desc\">Structured order ticket generation — translating the pre-trade checklist output into a ready-to-review order spec, as a first step toward execution integration.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"status\">Planned<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CLOSING -->\n  <section class=\"closing\" data-screen-label=\"07 Closing\">\n    <div class=\"label\">07 / Why this matters for SE roles<\u002Fdiv>\n    <p class=\"closing-body\">\n      Building this system taught me something I'd suspected but can now demonstrate: <strong>the hardest part of any tool isn't the technology, it's understanding the real workflow well enough to know what the tool actually needs to do.<\u002Fstrong> Every meaningful improvement in this project came from using it — running real screener outputs, tracing where the model disagreed with my own judgment, and working backwards to the cause. That cycle — <em class=\"aside\">deploy, observe, diagnose, improve<\u002Fem> — is exactly what good solutions engineering looks like in practice.\n    <\u002Fp>\n\n    <p class=\"closing-statement\">\n      I'm not looking to be handed a spec. I'm drawn to the part of the role where you figure out <em>what the spec should have been.<\u002Fem>\n    <\u002Fp>\n\n    <div class=\"signoff\">\n      <a href=\"mailto:jessica.mak216@hotmail.com\">jessica.mak216@hotmail.com<\u002Fa>\n      <a href=\"https://www.linkedin.com/in/jessica-mak-9869a9107/\" target=\"_blank\" rel=\"noopener\" class=\"secondary\">linkedin.com/in/jessica-mak<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer>\n    <div>VCP Trading System · Jessica Mak<\u002Fdiv>\n    <div>Last updated 2026.05<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n\n<\u002Fbody><\u002Fhtml>"
